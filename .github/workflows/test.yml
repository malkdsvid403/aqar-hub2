name: Simple Check

on: push

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check files exist
        run: |
          test -f Frontend/login-page.html || { echo "missing"; exit 1; }
          test -f Frontend/add-user-page.html || { echo "missing"; exit 1; }
          echo "Files are OK"
